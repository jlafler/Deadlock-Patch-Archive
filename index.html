<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Patch Archive</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="sticky-header" id="stickyHeader">
        <div class="pinned-title">
            <h1>Deadlock Patch Archive</h1>

            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="searchBar" placeholder="Search for a hero, item, or keyword...">
                    <button id="clearSearchBtn" class="clear-btn" title="Clear Search">✖</button>
                </div>
                <button id="toggleAllBtn" class="action-btn">Expand All</button>
            </div>
        </div>

        <div class="collapsible-content">
            <div class="calendar-wrapper">
                <div class="scroll-zone left" id="scrollZoneLeft"><span>◀</span></div>
                <div id="calendarBand" class="calendar-band"></div>
                <div class="scroll-zone right" id="scrollZoneRight"><span>▶</span></div>
            </div>

            <div class="calendar-controls">
                <button id="prevPatch" class="nav-btn">← Older</button>
                <button id="nextPatch" class="nav-btn">Newer →</button>
            </div>
        </div>

        <button id="headerToggle" class="header-toggle-btn">
            <span class="toggle-icon">▲</span>
        </button>
    </div>

    <div class="main-content-wrapper">
        <div class="patch-container" id="patchContainer">

            <div id="noResultsState" class="no-results-container" style="display: none;">
                <div class="no-results-icon">∅</div>
                <h2>No Changes Found</h2>
                <p>We couldn't find any updates matching "<span id="searchQueryDisplay"></span>".</p>
                <button
                    onclick="document.getElementById('searchBar').value = ''; document.getElementById('searchBar').dispatchEvent(new Event('input'));"
                    class="clear-results-btn">
                    Clear Search
                </button>
            </div>
        </div>

        <aside class="stats-sidebar" id="statsSidebar">
            <h3>Patch at a Glance</h3>

            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">Heroes Changed</span>
                    <span id="statHeroes" class="stat-value">0</span>
                </div>
                <div id="heroListPreview" class="hero-mini-list"></div>
            </div>

            <hr style="margin: 15px 0; border-color: #333;">

            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">Items Adjusted</span>
                    <span id="statItems" class="stat-value">0</span>
                </div>
                <div id="itemListPreview" class="hero-mini-list"></div>
            </div>

            <hr style="margin: 15px 0; border-color: #333;">

            <div class="stat-group">
                <div class="stat-item">
                    <span class="stat-label">Gameplay Tweaks</span>
                    <span id="statGameplay" class="stat-value">0</span>
                </div>
            </div>
        </aside>
    </div>
    <button id="backToTopBtn" class="back-to-top" title="Back to Top">▲</button>
    <script type="module" src="js/main.js"></script>
</body>

</html>
